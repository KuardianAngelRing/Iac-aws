<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="ui-sans-serif, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <!-- Background gradient that adapts to dark/light mode -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F1F3F5"/>
    </linearGradient>

    <!-- Phase color palette gradients -->
    <linearGradient id="supabaseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ECF8E"/>
      <stop offset="100%" stop-color="#2BB37A"/>
    </linearGradient>
    <linearGradient id="awsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#E67E00"/>
    </linearGradient>
    <linearGradient id="k8sGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#326CE5"/>
      <stop offset="100%" stop-color="#234FB5"/>
    </linearGradient>
    <linearGradient id="chaosGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4D4F"/>
      <stop offset="100%" stop-color="#D9363E"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B96B"/>
      <stop offset="100%" stop-color="#008F52"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers for each color -->
    <marker id="arrowSupabase" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3ECF8E"/>
    </marker>
    <marker id="arrowAws" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF9900"/>
    </marker>
    <marker id="arrowK8s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#326CE5"/>
    </marker>
    <marker id="arrowChaos" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF4D4F"/>
    </marker>
    <marker id="arrowAi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00B96B"/>
    </marker>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)"/>
  <rect width="1200" height="820" fill="url(#grid)"/>

  <!-- Title -->
  <g>
    <text x="60" y="55" font-size="28" font-weight="800" fill="#111827" letter-spacing="-0.5">
      KuardianAngelRing
    </text>
    <text x="60" y="80" font-size="14" font-weight="500" fill="#6B7280">
      AWS EKS · Chaos Mesh · LangGraph 기반 자가복구 시스템 아키텍처
    </text>
    <text x="60" y="100" font-size="12" font-weight="500" fill="#9CA3AF">
      Graduation Project · Phase 1~5
    </text>
  </g>

  <!-- Phase legend -->
  <g transform="translate(720, 40)">
    <rect x="0" y="0" width="440" height="70" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="0.5">PHASE LEGEND</text>

    <g transform="translate(16, 38)">
      <circle cx="6" cy="6" r="6" fill="#FF9900"/>
      <text x="20" y="10" font-size="11" font-weight="600" fill="#374151">P1 Infra</text>
    </g>
    <g transform="translate(102, 38)">
      <circle cx="6" cy="6" r="6" fill="#326CE5"/>
      <text x="20" y="10" font-size="11" font-weight="600" fill="#374151">P2 Observ.</text>
    </g>
    <g transform="translate(204, 38)">
      <circle cx="6" cy="6" r="6" fill="#FF4D4F"/>
      <text x="20" y="10" font-size="11" font-weight="600" fill="#374151">P3 Chaos</text>
    </g>
    <g transform="translate(296, 38)">
      <circle cx="6" cy="6" r="6" fill="#00B96B"/>
      <text x="20" y="10" font-size="11" font-weight="600" fill="#374151">P4 AI Agent</text>
    </g>
    <g transform="translate(396, 38)">
      <circle cx="6" cy="6" r="6" fill="#3ECF8E"/>
      <text x="20" y="10" font-size="11" font-weight="600" fill="#374151">P5 UI</text>
    </g>
  </g>

  <!-- ===================== SUPABASE (P5) ===================== -->
  <g transform="translate(440, 140)">
    <rect x="0" y="0" width="320" height="78" rx="14" fill="#FFFFFF" stroke="#3ECF8E" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="0" y="0" width="6" height="78" rx="3" fill="url(#supabaseGrad)"/>

    <!-- DB icon -->
    <g transform="translate(22, 18)">
      <ellipse cx="14" cy="6" rx="14" ry="5" fill="url(#supabaseGrad)"/>
      <path d="M 0 6 L 0 26 Q 0 32 14 32 Q 28 32 28 26 L 28 6" fill="none" stroke="#3ECF8E" stroke-width="2"/>
      <ellipse cx="14" cy="16" rx="14" ry="5" fill="none" stroke="#3ECF8E" stroke-width="2"/>
      <ellipse cx="14" cy="26" rx="14" ry="5" fill="none" stroke="#3ECF8E" stroke-width="2"/>
    </g>

    <text x="68" y="32" font-size="16" font-weight="700" fill="#111827">Supabase</text>
    <text x="68" y="50" font-size="11" font-weight="500" fill="#6B7280">Cloud Database · Auth · Realtime</text>
    <text x="68" y="66" font-size="10" font-weight="600" fill="#3ECF8E">PostgreSQL · Row Level Security</text>

    <!-- Phase tag -->
    <rect x="270" y="14" width="38" height="18" rx="9" fill="#3ECF8E" opacity="0.15"/>
    <text x="289" y="26" font-size="10" font-weight="700" fill="#1F8A5C" text-anchor="middle">P5</text>
  </g>

  <!-- Connection: EC2 -> Supabase -->
  <g>
    <path d="M 600 320 L 600 218" stroke="#3ECF8E" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowSupabase)"/>
    <rect x="612" y="255" width="118" height="22" rx="11" fill="#FFFFFF" stroke="#3ECF8E" stroke-width="1"/>
    <text x="671" y="270" font-size="10" font-weight="600" fill="#1F8A5C" text-anchor="middle">writes runs / state</text>
  </g>

  <!-- ===================== EC2 (P1 + P5 + P4) ===================== -->
  <g transform="translate(380, 240)">
    <!-- Outer container -->
    <rect x="0" y="0" width="440" height="160" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#softShadow)"/>
    <rect x="0" y="0" width="6" height="160" rx="3" fill="url(#awsGrad)"/>

    <!-- AWS EC2 header -->
    <g transform="translate(22, 18)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="url(#awsGrad)"/>
      <text x="14" y="19" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">EC2</text>
    </g>

    <text x="62" y="30" font-size="15" font-weight="700" fill="#111827">EC2 · Control Plane</text>
    <text x="62" y="46" font-size="11" font-weight="500" fill="#6B7280">GitOps + 카오스 테스트 대시보드 호스트</text>

    <!-- Phase tags -->
    <rect x="380" y="14" width="44" height="18" rx="9" fill="#FF9900" opacity="0.15"/>
    <text x="402" y="26" font-size="10" font-weight="700" fill="#B86A00" text-anchor="middle">P1</text>

    <!-- Sub-component: Next.js dashboard -->
    <g transform="translate(22, 70)">
      <rect x="0" y="0" width="195" height="74" rx="10" fill="#FAFAFA" stroke="#3ECF8E" stroke-width="1.5"/>
      <rect x="0" y="0" width="4" height="74" rx="2" fill="#3ECF8E"/>

      <g transform="translate(14, 12)">
        <rect x="0" y="0" width="22" height="22" rx="4" fill="#111827"/>
        <text x="11" y="16" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle">N</text>
      </g>

      <text x="46" y="22" font-size="12" font-weight="700" fill="#111827">Next.js Dashboard</text>
      <text x="46" y="36" font-size="10" font-weight="500" fill="#6B7280">:3000</text>

      <text x="14" y="58" font-size="10" font-weight="500" fill="#374151">실시간 메트릭 · 카오스 콘솔 · 리포트</text>

      <rect x="155" y="8" width="32" height="16" rx="8" fill="#3ECF8E" opacity="0.18"/>
      <text x="171" y="19" font-size="9" font-weight="700" fill="#1F8A5C" text-anchor="middle">P5</text>
    </g>

    <!-- Sub-component: worker.py -->
    <g transform="translate(231, 70)">
      <rect x="0" y="0" width="195" height="74" rx="10" fill="#FAFAFA" stroke="#00B96B" stroke-width="1.5"/>
      <rect x="0" y="0" width="4" height="74" rx="2" fill="#00B96B"/>

      <g transform="translate(14, 12)">
        <rect x="0" y="0" width="22" height="22" rx="4" fill="url(#aiGrad)"/>
        <text x="11" y="17" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">🧠</text>
      </g>

      <text x="46" y="22" font-size="12" font-weight="700" fill="#111827">worker.py</text>
      <text x="46" y="36" font-size="10" font-weight="500" fill="#6B7280">LangGraph Agent Loop</text>

      <text x="14" y="58" font-size="10" font-weight="500" fill="#374151">Detect → Diagnose → Heal → Verify</text>

      <rect x="155" y="8" width="32" height="16" rx="8" fill="#00B96B" opacity="0.18"/>
      <text x="171" y="19" font-size="9" font-weight="700" fill="#008F52" text-anchor="middle">P4</text>
    </g>
  </g>

  <!-- Connection: EC2 -> EKS (kubectl + chaos CRD) -->
  <g>
    <!-- Main vertical line -->
    <path d="M 600 400 L 600 480" stroke="#326CE5" stroke-width="2.5" fill="none" marker-end="url(#arrowK8s)"/>

    <!-- Label box for kubectl port-forward -->
    <rect x="610" y="412" width="200" height="22" rx="11" fill="#FFFFFF" stroke="#326CE5" stroke-width="1"/>
    <text x="710" y="427" font-size="10" font-weight="600" fill="#234FB5" text-anchor="middle">kubectl port-forward 9090 / 3100</text>

    <!-- Label box for K8s API -->
    <rect x="610" y="442" width="200" height="22" rx="11" fill="#FFFFFF" stroke="#FF4D4F" stroke-width="1"/>
    <text x="710" y="457" font-size="10" font-weight="600" fill="#B92529" text-anchor="middle">K8s API · chaos CRD apply</text>
  </g>

  <!-- ===================== EKS CLUSTER ===================== -->
  <g transform="translate(120, 490)">
    <!-- Cluster outer -->
    <rect x="0" y="0" width="960" height="290" rx="18" fill="#FFFFFF" stroke="#326CE5" stroke-width="2" stroke-dasharray="8,4" filter="url(#softShadow)"/>

    <!-- Cluster header -->
    <g transform="translate(24, 18)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="url(#k8sGrad)"/>
      <!-- K8s wheel-ish glyph -->
      <circle cx="14" cy="14" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="3" fill="#FFFFFF"/>
    </g>

    <text x="64" y="30" font-size="16" font-weight="700" fill="#111827">EKS Cluster</text>
    <text x="64" y="48" font-size="11" font-weight="500" fill="#6B7280">us-east-1 · Managed Node Groups · IRSA</text>

    <rect x="884" y="20" width="60" height="22" rx="11" fill="#326CE5" opacity="0.15"/>
    <text x="914" y="35" font-size="10" font-weight="700" fill="#234FB5" text-anchor="middle">PHASE 1</text>

    <!-- ============ ON-DEMAND NODE ============ -->
    <g transform="translate(28, 76)">
      <rect x="0" y="0" width="445" height="200" rx="14" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1.5"/>

      <!-- Node header -->
      <g transform="translate(16, 14)">
        <rect x="0" y="0" width="58" height="22" rx="11" fill="#FF9900"/>
        <text x="29" y="15" font-size="10" font-weight="800" fill="#FFFFFF" text-anchor="middle">ON-DEMAND</text>
      </g>
      <text x="84" y="29" font-size="13" font-weight="700" fill="#111827">m5.large × 1</text>
      <text x="16" y="56" font-size="10" font-weight="500" fill="#6B7280">관측·카오스 컨트롤 노드 (안정성 우선)</text>

      <!-- Pod tiles -->
      <!-- Prometheus -->
      <g transform="translate(16, 72)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#326CE5" stroke-width="1.2"/>
        <rect x="0" y="0" width="3" height="50" rx="1.5" fill="#326CE5"/>
        <circle cx="22" cy="25" r="11" fill="#326CE5" opacity="0.15"/>
        <text x="22" y="29" font-size="11" font-weight="800" fill="#326CE5" text-anchor="middle">P</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Prometheus</text>
        <text x="42" y="38" font-size="9" font-weight="500" fill="#6B7280">메트릭 수집 · :9090</text>
      </g>

      <!-- Grafana -->
      <g transform="translate(228, 72)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#326CE5" stroke-width="1.2"/>
        <rect x="0" y="0" width="3" height="50" rx="1.5" fill="#326CE5"/>
        <circle cx="22" cy="25" r="11" fill="#326CE5" opacity="0.15"/>
        <text x="22" y="29" font-size="11" font-weight="800" fill="#326CE5" text-anchor="middle">G</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Grafana</text>
        <text x="42" y="38" font-size="9" font-weight="500" fill="#6B7280">시각화 · :3000</text>
      </g>

      <!-- Loki -->
      <g transform="translate(16, 132)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#326CE5" stroke-width="1.2"/>
        <rect x="0" y="0" width="3" height="50" rx="1.5" fill="#326CE5"/>
        <circle cx="22" cy="25" r="11" fill="#326CE5" opacity="0.15"/>
        <text x="22" y="29" font-size="11" font-weight="800" fill="#326CE5" text-anchor="middle">L</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Loki</text>
        <text x="42" y="38" font-size="9" font-weight="500" fill="#6B7280">로그 집계 · :3100</text>
      </g>

      <!-- Chaos Mesh -->
      <g transform="translate(228, 132)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#FF4D4F" stroke-width="1.2"/>
        <rect x="0" y="0" width="3" height="50" rx="1.5" fill="#FF4D4F"/>
        <circle cx="22" cy="25" r="11" fill="#FF4D4F" opacity="0.15"/>
        <text x="22" y="29" font-size="11" font-weight="800" fill="#FF4D4F" text-anchor="middle">⚡</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Chaos Mesh</text>
        <text x="42" y="38" font-size="9" font-weight="500" fill="#6B7280">장애 주입 컨트롤러</text>
      </g>

      <!-- P2 / P3 phase tags -->
      <rect x="395" y="14" width="34" height="18" rx="9" fill="#326CE5" opacity="0.15"/>
      <text x="412" y="26" font-size="9" font-weight="700" fill="#234FB5" text-anchor="middle">P2/P3</text>
    </g>

    <!-- ============ SPOT NODES ============ -->
    <g transform="translate(487, 76)">
      <rect x="0" y="0" width="445" height="200" rx="14" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1.5"/>

      <!-- Node header -->
      <g transform="translate(16, 14)">
        <rect x="0" y="0" width="42" height="22" rx="11" fill="#FF9900"/>
        <text x="21" y="15" font-size="10" font-weight="800" fill="#FFFFFF" text-anchor="middle">SPOT</text>
      </g>
      <text x="68" y="29" font-size="13" font-weight="700" fill="#111827">m5.xlarge × 3</text>
      <text x="16" y="56" font-size="10" font-weight="500" fill="#6B7280">SUT 워크로드 (비용 효율 · 일부러 흔들리는 영역)</text>

      <!-- Istio -->
      <g transform="translate(16, 72)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#326CE5" stroke-width="1.2"/>
        <rect x="0" y="0" width="3" height="50" rx="1.5" fill="#326CE5"/>
        <circle cx="22" cy="25" r="11" fill="#326CE5" opacity="0.15"/>
        <text x="22" y="29" font-size="11" font-weight="800" fill="#326CE5" text-anchor="middle">◆</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Istio Service Mesh</text>
        <text x="42" y="38" font-size="9" font-weight="500" fill="#6B7280">트래픽 제어 · mTLS</text>
      </g>

      <!-- Online Boutique (SUT) -->
      <g transform="translate(228, 72)">
        <rect x="0" y="0" width="200" height="110" rx="8" fill="#FFFFFF" stroke="#FF4D4F" stroke-width="1.5"/>
        <rect x="0" y="0" width="3" height="110" rx="1.5" fill="#FF4D4F"/>
        <circle cx="22" cy="25" r="11" fill="#FF4D4F" opacity="0.15"/>
        <text x="22" y="29" font-size="12" font-weight="800" fill="#FF4D4F" text-anchor="middle">🎯</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Online Boutique</text>
        <text x="42" y="38" font-size="9" font-weight="600" fill="#FF4D4F">SUT · System Under Test</text>

        <line x1="14" y1="52" x2="186" y2="52" stroke="#E5E7EB" stroke-width="1"/>

        <text x="14" y="68" font-size="9" font-weight="500" fill="#374151">• 11 microservices (gRPC)</text>
        <text x="14" y="83" font-size="9" font-weight="500" fill="#374151">• 카오스 주입 대상</text>
        <text x="14" y="98" font-size="9" font-weight="500" fill="#374151">• Agent 자가복구 검증 타겟</text>
      </g>

      <!-- Workload-tier label -->
      <g transform="translate(16, 132)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#FF9900" stroke-width="1.2" stroke-dasharray="3,3"/>
        <rect x="0" y="0" width="3" height="50" rx="1.5" fill="#FF9900"/>
        <circle cx="22" cy="25" r="11" fill="#FF9900" opacity="0.15"/>
        <text x="22" y="29" font-size="12" font-weight="800" fill="#B86A00" text-anchor="middle">⚙</text>
        <text x="42" y="22" font-size="11" font-weight="700" fill="#111827">Karpenter / HPA</text>
        <text x="42" y="38" font-size="9" font-weight="500" fill="#6B7280">오토스케일 · spot 인터럽트 대비</text>
      </g>

      <rect x="395" y="14" width="34" height="18" rx="9" fill="#FF4D4F" opacity="0.15"/>
      <text x="412" y="26" font-size="9" font-weight="700" fill="#B92529" text-anchor="middle">P3</text>
    </g>
  </g>

  <!-- Footer caption -->
  <g>
    <text x="600" y="805" font-size="10" font-weight="500" fill="#9CA3AF" text-anchor="middle">
      Phase 1 인프라 → Phase 2 관측 → Phase 3 카오스 → Phase 4 AI 자가복구 → Phase 5 대시보드 · 통합 자가복구 루프
    </text>
  </g>
</svg>
