apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-svc
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/KuardianAngelRing/Iac-aws
      targetRevision: main
      path: helm/generic-app
      helm:
        valueFiles:
          - $values/gitops/apps/payment-svc/values.yaml
    - repoURL: https://github.com/KuardianAngelRing/Iac-aws
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sut
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
